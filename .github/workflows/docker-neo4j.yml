name: Docker Neo4j

on:
  schedule:
    - cron: '0 8 * * 4' # Runs weekly on master
  push:
    branches: [ "master", "dev" ]
    paths:
      - 'docker/neo4j/**'
  pull_request:
    branches: [ "master", "dev" ]
    paths:
      - 'docker/neo4j/**'

env:
  REGISTRY: ghcr.io
  NEO4J_IMAGE_NAME: ${{ github.repository }}-neo4j

jobs:
  build-neo4j:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v2.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0
        with:
          install: true
          use: true

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for Neo4j
        id: meta-neo4j
        uses: docker/metadata-action@v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.NEO4J_IMAGE_NAME }}
          tags: |
            # Create the 'latest' tag when the trigger is a weekly schedule
            type=schedule,pattern=latest
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Build and push Neo4j Docker image
        id: build-and-push-neo4j
        uses: docker/build-push-action@v5.0.0
        with:
          context: ./docker/neo4j
          file: ./docker/neo4j/Dockerfile
          # Always push on schedule or push events (but not PRs)
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-neo4j.outputs.tags }}
          labels: ${{ steps.meta-neo4j.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
